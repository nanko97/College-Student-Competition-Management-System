<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>更新jingsaileixing字段</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .success { color: #27ae60; font-weight: bold; }
        .error { color: #e74c3c; font-weight: bold; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-size: 14px; background: #2980b9; color: white; }
        #log { background: #f5f5f5; padding: 15px; border-radius: 4px; margin-top: 15px; white-space: pre-wrap; font-size: 13px; }
    </style>
</head>
<body>
    <h2>更新jingsaileixing字段</h2>
    <p>更新ID=845773896086065152的记录，补充竞赛类型字段</p>
    <button onclick="updateData()">执行更新</button>
    <div id="log"></div>

    <script>
        const API_BASE = 'http://localhost:9090/BYSJ_Springboot';
        
        function log(msg, type = '') {
            const div = document.getElementById('log');
            div.innerHTML += `<span class="${type}">${new Date().toLocaleTimeString()} - ${msg}</span>\n`;
        }

        async function updateData() {
            log('开始登录...', 'info');
            
            // 1. 登录
            const loginRes = await fetch(`${API_BASE}/jiaoshi/login?username=text002&password=123456`);
            const loginData = await loginRes.json();
            
            if (loginData.code !== 0) {
                log(`登录失败: ${loginData.msg}`, 'error');
                return;
            }
            
            const token = loginData.token;
            log(`登录成功! token=${token}`, 'success');
            
            // 2. 更新数据
            log('正在更新数据...', 'info');
            const updateData = {
                id: 845773896086065152,
                xuehao: 'Text001',
                xueshengxingming: '测试员01',
                jingsaimingcheng: '测试01',
                jingsaileixing: '测试竞赛',
                zuopinpingfen: 90,
                pingjianeirong: '测试通过',
                gonghao: 'text002'
            };
            
            const updateRes = await fetch(`${API_BASE}/zuopindafen/update`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': token },
                body: JSON.stringify(updateData)
            });
            
            const updateResult = await updateRes.json();
            
            if (updateResult.code === 0) {
                log('更新成功!', 'success');
                
                // 3. 验证更新结果
                log('验证更新结果...', 'info');
                const queryRes = await fetch(`${API_BASE}/zuopindafen/info/845773896086065152`, {
                    headers: { 'token': token }
                });
                const queryData = await queryRes.json();
                
                if (queryData.code === 0) {
                    const data = queryData.data;
                    log(`验证成功! jingsaileixing=${data.jingsaileixing}`, 'success');
                    log(`完整数据: ${JSON.stringify(data, null, 2)}`, 'info');
                }
            } else {
                log(`更新失败: ${updateResult.msg}`, 'error');
            }
        }
    </script>
</body>
</html>
