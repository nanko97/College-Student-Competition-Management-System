# ============================================
# 大学生竞赛管理系统 - 配置文件
# ============================================

# --------------------------------------------
# 1. 服务器配置
# --------------------------------------------
server:
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    min-spare-threads: 10
    connection-timeout: 20000
    compression: on
    compressable-mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  
  port: 9090
  servlet:
    context-path: /BYSJ_Springboot

# --------------------------------------------
# 2. Spring 核心配置
# --------------------------------------------
spring:
  profiles:
    active: dev
  
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/bysj_springboot?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true
    username: root
    password: 123123
    
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      pool-name: SpringBootBYSJHikariPool
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      auto-commit: true

  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # 2.4 静态资源配置
  # 【注意】静态资源映射已统一在 WebMvcConfig.java 中配置
  # 注释掉此处的 static-locations 避免与 WebMvcConfig 产生冲突
  # resources:
  #   static-locations:
  #     - classpath:/static/
  #     - file:./static/
  #     - file:D:/BYSJ/BYSJ/Springboot_BYSJ/upload/

  # 2.5 定时任务配置
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduling-
    # 添加初始延迟60秒，避免启动时数据库连接未就绪
    initial-delay: 60000
  
  # 2.6 Jackson JSON 序列化配置
  jackson:
    # 日期格式化
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    # 序列化配置
    serialization:
      # 不序列化 null 值
      write-null-map-values: false
    # 反序列化配置
    deserialization:
      # 允许未知属性
      fail-on-unknown-properties: false

  # 2.7 邮件配置（论文3.1.1(6)邮件推送通知）
  # 【需修改】请填写您的SMTP邮箱配置，支持QQ邮箱、163邮箱等
  # QQ邮箱示例：host=smtp.qq.com, username=你的QQ号@qq.com, password=授权码
  # 163邮箱示例：host=smtp.163.com, username=你的账号@163.com, password=授权码
  # 如不使用邮件推送，可将enabled设为false
  mail:
    enabled: false                    # 是否启用邮件推送（默认关闭，需配置SMTP后开启）
    host: smtp.qq.com                 # SMTP服务器地址
    port: 465                         # SMTP端口（SSL加密用465，非加密用25）
    username: your_email@qq.com       # 【需修改】发件邮箱账号
    password: your_auth_code           # 【需修改】邮箱授权码（不是登录密码）
    protocol: smtp                    # 邮件协议
    default-encoding: UTF-8           # 部件编码
    ssl:
      trust: smtp.qq.com              # SSL信任主机
    properties:
      mail:
        smtp:
          auth: true                   # 启用SMTP认证
          starttls:
            enable: true               # 启用TLS加密
          ssl:
            enable: true               # 启用SSL加密
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory  # SSL Socket工厂
            port: 465                  # SSL端口

# --------------------------------------------
# 3. MyBatis-Plus 配置
# --------------------------------------------
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml    # Mapper XML 文件位置
  typeAliasesPackage: com.entity               # 实体类别名包
  
  # 全局配置
  global-config:
    id-type: 1                                 # 主键策略：1-自增
    field-strategy: 2                          # 字段策略：2-非空判断
    db-column-underline: true                  # 下划线命名转驼峰
    logic-delete-value: -1                     # 逻辑删除值
    logic-not-delete-value: 0                  # 逻辑未删除值
  
  # 高级配置（一般无需修改）
  configuration:
    map-underscore-to-camel-case: true         # 下划线转驼峰
    cache-enabled: true                        # 启用一级缓存
    call-setters-on-nulls: true                # null 值调用 setter
    jdbc-type-for-null: 'null'                 # null 的 JDBC 类型
    default-fetch-size: 100                    # 默认 fetch 大小
    default-statement-timeout: 25              # 默认语句超时时间

# --------------------------------------------
# 4. 文件上传配置
# --------------------------------------------
file:
  upload:
    max-size: 10485760             # 上传文件最大大小：10MB（字节）
    allow-types: jpg,png,jpeg,gif,pdf,doc,docx  # 允许的文件类型
    path: ./upload/                # 上传文件保存路径（相对路径）

# --------------------------------------------
# 5. 登录安全配置
# --------------------------------------------
login:
  max-fail-count: 5                # 登录失败次数限制：5 次

# ============================================
# 配置结束
# 
# 【快速开始】
# 1. 修改数据库用户名和密码（第 18-19 行）
# 2. 确保 MySQL 服务已启动
# 3. 运行项目，访问：http://localhost:9090/BYSJ_Springboot
#
# 【常见问题】
# Q: 数据库连接失败？
# A: 检查 MySQL 服务是否启动，数据库是否存在，用户名密码是否正确
#
# Q: 端口被占用？
# A: 修改第 23 行的 server.port 为其他端口，如 8081
#
# Q: 文件上传失败？
# A: 检查 upload 目录是否有写权限，或修改第 75 行的路径
# ============================================

# --------------------------------------------
# 6. Swagger API 文档配置
# --------------------------------------------
swagger:
  enabled: true                    # 是否启用 Swagger（生产环境建议设为 false）
