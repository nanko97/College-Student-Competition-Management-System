# ============================================
# 大学生竞赛管理系统 - 配置文件
# ============================================
# 【毕业设计版本】配置说明：
# - 所有配置项都有中文注释，便于理解和修改
# - 默认配置已优化，一般情况下无需修改
# - 如需修改数据库等配置，请重点关注相关部分
# ============================================

# --------------------------------------------
# 1. 服务器配置
# --------------------------------------------
server:
  # Tomcat 基础配置
  tomcat:
    uri-encoding: UTF-8              # 字符编码（固定值，勿改）
    max-threads: 200                 # 最大线程数（默认即可）
    min-spare-threads: 10            # 最小空闲线程（默认即可）
    connection-timeout: 20000        # 连接超时时间：20 秒
    compression: on                  # 启用 GZIP 压缩（提升性能）
    compressable-mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  
  port: 8080                         # 服务端口号，访问地址：http://localhost:8080/springbootrd362
  servlet:
    context-path: /springbootrd362   # 项目访问路径

# --------------------------------------------
# 2. Spring 核心配置
# --------------------------------------------
spring:
  # 2.1 数据库配置【重要】
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    # 数据库连接 URL
    # 说明：连接本地 MySQL 数据库，数据库名为 springbootrd362
    url: jdbc:mysql://127.0.0.1:3306/springbootrd362?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true
    username: root                   # 【需修改】数据库用户名，默认 root
    password: 123123                 # 【需修改】数据库密码，请根据实际情况修改
    
    # HikariCP 连接池配置（高性能，默认即可）
    hikari:
      minimum-idle: 5                # 最小空闲连接数
      maximum-pool-size: 20          # 最大连接池大小
      idle-timeout: 300000           # 连接超时时间：5 分钟
      pool-name: SpringBootBYSJHikariPool  # 连接池名称
      max-lifetime: 1800000          # 连接最大生命周期：30 分钟
      connection-timeout: 30000      # 获取连接超时：30 秒
      connection-test-query: SELECT 1        # 连接测试查询
      auto-commit: true              # 自动提交

  # 2.2 Redis 缓存配置
  # 说明：用于存储登录失败次数、Token 等临时数据
  # 如未安装 Redis，可暂时不配置，不影响基本功能
  redis:
    host: localhost                  # Redis 服务器地址
    port: 6379                       # Redis 端口号
    password:                        # Redis 密码（无密码留空）
    database: 0                      # 使用的数据库索引
    timeout: 5000ms                  # 连接超时：5 秒
    lettuce:
      pool:
        max-active: 8                # 最大活跃连接数
        max-wait: -1ms               # 最大阻塞等待时间（-1 表示不限制）
        max-idle: 8                  # 最大空闲连接数
        min-idle: 0                  # 最小空闲连接数

  # 2.3 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB            # 单个文件最大大小
      max-request-size: 10MB         # 单次请求最大大小
  
  # 2.4 静态资源配置
  resources:
    static-locations: classpath:static/,file:static/

# --------------------------------------------
# 3. MyBatis-Plus 配置
# --------------------------------------------
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml    # Mapper XML 文件位置
  typeAliasesPackage: com.entity               # 实体类别名包
  
  # 全局配置
  global-config:
    id-type: 1                                 # 主键策略：1-自增
    field-strategy: 2                          # 字段策略：2-非空判断
    db-column-underline: true                  # 下划线命名转驼峰
    logic-delete-value: -1                     # 逻辑删除值
    logic-not-delete-value: 0                  # 逻辑未删除值
  
  # 高级配置（一般无需修改）
  configuration:
    map-underscore-to-camel-case: true         # 下划线转驼峰
    cache-enabled: true                        # 启用一级缓存
    call-setters-on-nulls: true                # null 值调用 setter
    jdbc-type-for-null: 'null'                 # null 的 JDBC 类型
    default-fetch-size: 100                    # 默认 fetch 大小
    default-statement-timeout: 25              # 默认语句超时时间

# --------------------------------------------
# 4. 文件上传配置
# --------------------------------------------
file:
  upload:
    max-size: 10485760             # 上传文件最大大小：10MB（字节）
    allow-types: jpg,png,jpeg,gif,pdf,doc,docx  # 允许的文件类型
    path: ./upload/                # 上传文件保存路径（相对路径）

# --------------------------------------------
# 5. 登录安全配置
# --------------------------------------------
login:
  max-fail-count: 5                # 登录失败次数限制：5 次

# ============================================
# 配置结束
# 
# 【快速开始】
# 1. 修改数据库用户名和密码（第 18-19 行）
# 2. 确保 MySQL 服务已启动
# 3. 运行项目，访问：http://localhost:8080/springbootrd362
#
# 【常见问题】
# Q: 数据库连接失败？
# A: 检查 MySQL 服务是否启动，数据库是否存在，用户名密码是否正确
#
# Q: 端口被占用？
# A: 修改第 10 行的 server.port 为其他端口，如 8081
#
# Q: 文件上传失败？
# A: 检查 upload 目录是否有写权限，或修改第 75 行的路径
# ============================================
