# Tomcat 性能优化配置
server:
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200  # 最大工作线程数
    min-spare-threads: 10  # 最小空闲线程数
    connection-timeout: 20000  # 连接超时时间 (ms)
    compression: on  # 启用 GZIP 压缩
    compressable-mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  port: 8080
  servlet:
    context-path: /springbootrd362

spring:
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/springbootrd362?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true
    username: root
    password: 123123
    # HikariCP 高性能连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      pool-name: SpringBootBYSJHikariPool
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      auto-commit: true

  # Redis 缓存配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  resources:
    static-locations: classpath:static/,file:static/

# MyBatis-Plus 性能优化配置
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  typeAliasesPackage: com.entity
  global-config:
    id-type: 1
    field-strategy: 2
    db-column-underline: true
    logic-delete-value: -1
    logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true  # 启用一级缓存
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    default-fetch-size: 100
    default-statement-timeout: 25

# 文件上传配置
file:
  upload:
    max-size: 10485760
    allow-types: jpg,png,jpeg,gif,pdf,doc,docx
    path: ./upload/

# 登录配置
login:
  max-fail-count: 5
