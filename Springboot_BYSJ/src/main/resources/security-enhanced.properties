# ============================================
# 安全配置增强 - 产品化版本
# ============================================
# 说明：此文件包含额外的安全配置选项
# 使用方法：在 application.yml 中通过 @PropertySource 引入
# ============================================

# --------------------------------------------
# 1. HTTP 请求限制
# --------------------------------------------
# 最大 HTTP 请求头大小（字节）
server.tomcat.max-http-header-size=8192

# 最大 HTTP POST 请求体大小（字节，2MB）
server.tomcat.max-http-post-size=2097152

# 最大连接数
server.tomcat.max-connections=8192

# 接受计数阈值
server.tomcat.accept-count=100

# --------------------------------------------
# 2. 文件上传安全
# --------------------------------------------
# 单个文件最大大小（10MB）
file.upload.max-size=10485760

# 允许的文件类型
file.upload.allow-types=jpg,png,jpeg,gif,pdf,doc,docx,xls,xlsx,ppt,pptx,zip,rar

# 禁止的文件类型（黑名单）
file.upload.deny-types=exe,bat,cmd,com,ps1,vbs,js,jar,class

# --------------------------------------------
# 3. XSS 防护
# --------------------------------------------
# 启用 XSS 过滤
security.xss.enabled=true

# XSS 过滤的 URL 模式
security.xss.url-patterns=/*

# 排除的 URL 模式（不需要 XSS 过滤的路径）
security.xss.excluded-url-patterns=/static/*,/css/*,/js/*,/images/*

# --------------------------------------------
# 4. SQL 注入防护
# --------------------------------------------
# 启用 SQL 注入检测
security.sql.injection.detection-enabled=true

# SQL 注入检测的 URL 模式
security.sql.injection.url-patterns=/api/*

# --------------------------------------------
# 5. CSRF 防护
# --------------------------------------------
# 启用 CSRF 保护（对于前后端分离项目，通常使用 JWT，可以禁用）
security.csrf.enabled=false

# --------------------------------------------
# 6. CORS 跨域配置
# --------------------------------------------
# 允许的源（多个用逗号分隔，* 表示所有）
security.cors.allowed-origins=*

# 允许的方法
security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# 允许的请求头
security.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin

# 暴露的响应头
security.cors.exposed-headers=Authorization

# 是否允许携带凭证
security.cors.allow-credentials=false

# 预检请求缓存时间（秒）
security.cors.max-age=3600

# --------------------------------------------
# 7. Session 安全
# --------------------------------------------
# Session Cookie 名称
server.servlet.session.cookie.name=BYSJ_SESSION

# Session Cookie 是否仅通过 HTTPS 传输
server.servlet.session.cookie.secure=false

# Session Cookie 是否禁止 JavaScript 访问
server.servlet.session.cookie.http-only=true

# Session Cookie 的 SameSite 属性
server.servlet.session.cookie.same-site=lax

# Session 超时时间（分钟）
server.servlet.session.timeout=30

# --------------------------------------------
# 8. 密码策略
# --------------------------------------------
# 最小密码长度
security.password.min-length=8

# 是否要求大写字母
security.password.require-uppercase=true

# 是否要求小写字母
security.password.require-lowercase=true

# 是否要求数字
security.password.require-digit=true

# 是否要求特殊字符
security.password.require-special=true

# 密码历史数量（不能与最近 N 次密码相同）
security.password.history-count=5

# 密码过期天数（0 表示不过期）
security.password.expire-days=90

# --------------------------------------------
# 9. 登录安全
# --------------------------------------------
# 登录失败锁定阈值
security.login.max-fail-count=5

# 锁定时长（分钟）
security.login.lock-duration=30

# 登录验证码启用
security.login.captcha-enabled=true

# 登录验证码类型（math-数学公式，char-字符）
security.login.captcha-type=math

# --------------------------------------------
# 10. API 速率限制
# --------------------------------------------
# 启用速率限制
security.rate-limit.enabled=true

# 每分钟最大请求数
security.rate-limit.requests-per-minute=60

# 突发请求数
security.rate-limit.burst=10

# --------------------------------------------
# 11. 敏感信息脱敏
# --------------------------------------------
# 启用响应脱敏
security.response.sanitize.enabled=true

# 需要脱敏的字段
security.response.sanitize.fields=password,idCard,phone,email,bankCard

# --------------------------------------------
# 12. 安全头
# --------------------------------------------
# X-Frame-Options
security.headers.x-frame-options=DENY

# X-Content-Type-Options
security.headers.x-content-type-options=nosniff

# X-XSS-Protection
security.headers.x-xss-protection=1; mode=block

# Strict-Transport-Security (HSTS)
security.headers.strict-transport-security=max-age=31536000; includeSubDomains

# Content-Security-Policy
security.headers.content-security-policy=default-src 'self'

# Referrer-Policy
security.headers.referrer-policy=no-referrer-when-downgrade
