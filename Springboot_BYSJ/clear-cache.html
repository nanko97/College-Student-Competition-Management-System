<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=admin/dist/index.html">
    <title>正在清除缓存并刷新...</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🔄 正在清除缓存并刷新...</h1>
    <div class="spinner"></div>
    <div class="message">
        <p><strong>修复已完成！前端代码已重新编译。</strong></p>
        <p>请按以下步骤操作：</p>
        <ol style="text-align: left; display: inline-block;">
            <li>按 <strong>Ctrl + Shift + Delete</strong> 清除浏览器缓存</li>
            <li>或按 <strong>Ctrl + F5</strong> 强制刷新</li>
            <li>如果自动跳转失败，点击 <a href="admin/dist/index.html" style="color: yellow;">这里</a> 手动访问</li>
        </ol>
    </div>
    <script>
        // 清除 localStorage 和 sessionStorage
        localStorage.clear();
        sessionStorage.clear();
        
        // 3 秒后跳转到系统首页
        setTimeout(function() {
            window.location.href = 'admin/dist/index.html';
        }, 3000);
        
        console.log('✅ 缓存已清除，前端代码已更新到最新版本');
        console.log('💡 提示：如果页面没有自动刷新，请按 Ctrl+F5 强制刷新');
    </script>
</body>
</html>
