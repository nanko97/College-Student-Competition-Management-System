# ============================================
# 大学生竞赛管理系统 - Nginx 配置
# 部署路径：/etc/nginx/sites-available/bysj
# ============================================

server {
    listen 80;
    server_name _;  # 替换为你的域名或 IP，_ 表示匹配所有

    # 字符集
    charset utf-8;

    # 前端静态文件
    root /opt/bysj/frontend;
    index index.html;

    # 访问日志
    access_log /var/log/nginx/bysj_access.log;
    error_log  /var/log/nginx/bysj_error.log;

    # 限制上传文件大小
    client_max_body_size 20M;

    # 前端页面（SPA hash 模式，所有非 API 路径都返回 index.html）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理
    location /BYSJ_Springboot/ {
        proxy_pass http://127.0.0.1:9090/BYSJ_Springboot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # 上传文件访问（图片等静态资源）
    location /BYSJ_Springboot/upload/ {
        alias /opt/bysj/upload/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
    }
}
