<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录功能测试</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
           color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .test-section h2 {
            margin-top: 0;
           color: #667eea;
            font-size: 18px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
           color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }
        .success {
           color: #28a745;
        }
        .error {
           color: #dc3545;
        }
        .info {
           color: #17a2b8;
        }
        .account-list {
            list-style: none;
            padding: 0;
        }
        .account-list li {
            padding: 8px;
            margin: 5px 0;
            background: white;
            border-radius: 4px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }
        .status.running {
            background: #d4edda;
           color: #155724;
        }
        .status.stopped {
            background: #f8d7da;
           color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 竞赛管理系统 - 登录功能测试</h1>
        
        <div class="test-section">
            <h2>📊 服务状态检查</h2>
            <div id="serviceStatus">正在检查...</div>
        </div>

        <div class="test-section">
            <h2>👤 测试账号</h2>
            <ul class="account-list">
                <li><strong>学生:</strong> 2022001 / 123456 <span class="status running">可用</span></li>
                <li><strong>教师:</strong> T2022001 / 123456 <span class="status running">可用</span></li>
                <li><strong>管理员:</strong> admin / admin123 <span class="status running">可用</span></li>
            </ul>
        </div>

        <div class="test-section">
            <h2>🧪 登录测试</h2>
            <button onclick="testStudentLogin()">测试学生登录</button>
            <button onclick="testTeacherLogin()">测试教师登录</button>
            <button onclick="testAdminLogin()">测试管理员登录</button>
            <div id="loginResult" class="result">点击按钮开始测试...</div>
        </div>

        <div class="test-section">
            <h2>🔗 快速访问</h2>
            <button onclick="window.open('http://localhost:8081/', '_blank')">打开前端页面 (8081)</button>
            <button onclick="window.open('http://localhost:8080/springbootrd362/', '_blank')">访问后端 API (8080)</button>
        </div>
    </div>

    <script>
        // 检查服务状态
        async function checkServiceStatus() {
           const statusDiv = document.getElementById('serviceStatus');
            let html = '';

            // 检查后端
            try {
               const backendResp = await fetch('http://localhost:8080/springbootrd362/', { method: 'GET' });
                html += `<p>✅ 后端服务 (8080): <span class="status running">运行中</span></p>`;
            } catch (error) {
                html += `<p>❌ 后端服务 (8080): <span class="status stopped">未运行</span></p>`;
            }

            // 检查前端
            try {
               const frontendResp = await fetch('http://localhost:8081/', { method: 'GET' });
                html += `<p>✅ 前端服务 (8081): <span class="status running">运行中</span></p>`;
            } catch (error) {
                html += `<p>❌ 前端服务 (8081): <span class="status stopped">未运行</span></p>`;
            }

            statusDiv.innerHTML = html;
        }

        // 测试学生登录
        async function testStudentLogin() {
           const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '<span class="info">正在测试学生登录...</span>';
            
            try {
               const response = await fetch('http://localhost:8080/springbootrd362/xuesheng/login?username=2022001&password=123456', {
                    method: 'POST'
                });
               const data = await response.json();
                
                if (data.code === 0) {
                    resultDiv.innerHTML = `<span class="success">✅ 学生登录成功！</span>\n<br>Token: ${data.token}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ 学生登录失败：${data.msg}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 请求失败：${error.message}</span>`;
            }
        }

        // 测试教师登录
        async function testTeacherLogin() {
           const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '<span class="info">正在测试教师登录...</span>';
            
            try {
               const response = await fetch('http://localhost:8080/springbootrd362/jiaoshi/login?username=T2022001&password=123456', {
                    method: 'POST'
                });
               const data = await response.json();
                
                if (data.code === 0) {
                    resultDiv.innerHTML = `<span class="success">✅ 教师登录成功！</span>\n<br>Token: ${data.token}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ 教师登录失败：${data.msg}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 请求失败：${error.message}</span>`;
            }
        }

        // 测试管理员登录
        async function testAdminLogin() {
           const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '<span class="info">正在测试管理员登录...</span>';
            
            try {
               const response = await fetch('http://localhost:8080/springbootrd362/users/login?username=admin&password=admin123', {
                    method: 'POST'
                });
               const data = await response.json();
                
                if (data.code === 0) {
                    resultDiv.innerHTML = `<span class="success">✅ 管理员登录成功！</span>\n<br>Token: ${data.token}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ 管理员登录失败：${data.msg}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 请求失败：${error.message}</span>`;
            }
        }

        // 页面加载时检查服务状态
       window.onload = checkServiceStatus;
    </script>
</body>
</html>
